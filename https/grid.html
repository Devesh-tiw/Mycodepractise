<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid practise</title>
    <style>
        .container{
            height:400px;
            width:400px;
            border:1px solid black;
background-color:red;
display:flex;
justify-content: center;
align-items: center;
border-radius:20px;

        }
        .babu{
            height:200px;
            width:200px;
            border:1px solid black;
            background-color:yellow;
               display:flex;
            justify-content:center;
            align-items:center;
            border-radius:20px;
        }
         .baccha{
            height:300px;
            width:300px;
            border:1px solid black;
            background-color:rgb(0, 68, 255);
            display:flex;
            justify-content:center;
            align-items:center;
            border-radius:20px;
          
        }
        .lalla{
            height:100px;
            width:100px;
            border:1px solid black;
            background-color:rgb(255, 0, 242);
            border-radius:20px;
        }
    </style>
</head>
<body>
    <div class="container">
       
        <div class="baccha"><div class="babu"><div class="lalla"></div></div></div>
    </div>
</body>
</html>
