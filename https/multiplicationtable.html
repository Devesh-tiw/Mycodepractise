<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiplicationTable</title>
</head>
<body>
    <h1>Multplication Table</h1>
    <input type="number" placeholder="Enter the number" id="age">
    <p id="para"></p>
    <button onclick="check()">print table()</button>
</body>
<script>
    function check() {
        let num = Number(document.getElementById("age").value);
        if (!num) {
            document.getElementById("para").innerHTML = "Please enter a valid number";
            return;
        }
        let table = "";
        for (let i = 1; i <= 10; i++) {
            table += `${num} x ${i} = ${num * i}<br>`;
        }
        document.getElementById("para").innerHTML = table;
    }
    </script>
</html>
