<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-11 Dashboard layout</title>
    <style>
        /* =========================================
           1. Global Styles & Variables
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
        }

        /* =========================================
           2. Main Layout using CSS Grid (Requirement 1)
           ========================================= */
        .container {
            display: grid;
            grid-template-columns: 200px 1fr;
            grid-template-rows: 60px 1fr 50px;
            grid-template-areas:
                "header header"
                "sidebar content"
                "footer footer";
            min-height: 100vh;
        }

        /* =========================================
           3. Header Section (Requirement 2)
           ========================================= */
        .header {
            grid-area: header;
            background-color: #2c3e50;
            color: white;
            /* Flexbox for alignment */
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .header .logo {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            /* Transition & Transformation for Hover */
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .header .logo:hover {
            transform: scale(1.05);
            color: #3498db;
        }

        /* =========================================
           4. Sidebar Section (Requirement 3 & 7)
           ========================================= */
        .sidebar {
            grid-area: sidebar;
            background-color: #34495e;
            color: #ecf0f1;
            padding-top: 20px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            padding: 15px 20px;
            cursor: pointer;
            font-size: 1.1rem;
            /* Smooth transition for hover effects */
            transition: background-color 0.3s ease, color 0.3s ease, transform 0.3s ease;
        }

        .sidebar ul li:hover {
            background-color: #2c3e50;
            color: #3498db;
            /* Transformation: move sidebar items */
            transform: translateX(10px);
        }

        /* =========================================
           5. Content Area & Cards (Requirement 4 & 6)
           ========================================= */
        .content {
            grid-area: content;
            padding: 20px;
            /* Grid layout for cards */
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            /* Ensure content doesn't overflow grid */
            align-content: start;
        }

        .card {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            text-align: center;
            cursor: pointer;
            /* Smooth transitions */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            /* Animation on page load (Requirement 5) */
            animation: fadeIn 0.8s ease-in-out forwards;
            opacity: 0;
            /* Starting state for animation */
        }

        /* Staggered animation delays for a nice effect */
        .card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .card:nth-child(4) {
            animation-delay: 0.4s;
        }

        .card:nth-child(5) {
            animation-delay: 0.5s;
        }

        .card:nth-child(6) {
            animation-delay: 0.6s;
        }

        .card:nth-child(7) {
            animation-delay: 0.7s;
        }

        .card:nth-child(8) {
            animation-delay: 0.8s;
        }

        .card:nth-child(9) {
            animation-delay: 0.9s;
        }

        .card:nth-child(10) {
            animation-delay: 1.0s;
        }

        /* Transformation: enlarge card on hover */
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .card h3 {
            padding: 15px;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        /* =========================================
           6. Footer Section (Requirement 8)
           ========================================= */
        .footer {
            grid-area: footer;
            background-color: #bdc3c7;
            color: #2c3e50;
            /* Flexbox to center text */
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        /* =========================================
           7. Keyframe Animations (Requirement 5)
           ========================================= */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive adjustment for smaller screens */
        @media (max-width: 900px) {
            .content {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "header"
                    "sidebar"
                    "content"
                    "footer";
            }

            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header class="header">
            <div class="logo">
                📊 <span>Dashboard</span>
            </div>
        </header>

        <aside class="sidebar">
            <ul>
                <li>Home</li>
                <li>Analytics</li>
                <li>Reports</li>
                <li>Settings</li>
                <li>Profile</li>
            </ul>
        </aside>

        <main class="content" id="card-container">
        </main>

        <footer class="footer">
            &copy; 2026 Dashboard
        </footer>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('card-container');
            const totalCards = 10;

            // Loop to create at least 10 cards as per Requirement 4
            for (let i = 1; i <= totalCards; i++) {
                // Create card element
                const card = document.createElement('div');
                card.className = 'card';

                // Create image element (using a placeholder image service)
                const img = document.createElement('img');
                img.src = `https://picsum.photos/seed/${i * 10}/300/200`;
                img.alt = `Card Image ${i}`;

                // Create title element
                const title = document.createElement('h3');
                title.textContent = `Card Title ${i}`;

                // Append img and title to card
                card.appendChild(img);
                card.appendChild(title);

                // Append card to content container
                container.appendChild(card);
            }
        });
    </script>

</body>

</html>
