<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo CSS</title>
    <style>
a:link{
color:blue;
text-decoration:none;
        }
a:visited{
            color:red;
text-decoration:underline;
        }
a:hover{
    color:red;
text-decoration:underline;
background-image:linear-gradient(hotpink,purple);
}
    </style>
</head>
<body>
    <a href="https://news.google.com/home?hl=en-IN&gl=IN&ceid=IN:en" > Google news </a>
</body>
</html>
