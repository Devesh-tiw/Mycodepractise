<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        #animation{
        text-align:center;
            border:2px;
            height:400px;
            width:20px;
            background-color:orange;
            margin:200px;


        }
        #animation1{

            border:2px;
            height:200px;
            width:200px;
            background-color:orange;
            

        }
        #animation1:hover{
      
            animation-name:don;
            animation-duration:2s;
            animation-iteration-count:infinite;
            animation-direction:alternate;
            animation-timing-function: ease-in-out;

        }
        #animation:hover{
            animation-name:ani;
            transform-origin:top;
            animation-duration:2ms;
            animation-iteration-count:infinite;

        }
        @keyframes ani{
            from{
                transform:rotate(0);
            }
            to{
                transform:rotate(360deg);
            }
        }
        @keyframes don{
 0%{
                transform:translateX(0px);

            }
            25%{
                transform:translateX(400px);
            }
             50%{
                transform:translateY(400px);
            }
             75%{
                transform:translateX(-400px);
            }
          
             100%{
                transform:translateY(-400px);
            }
        }
    </style>
</head>
<body>
    <h1>Animation 1 </h1>
    <div id="animation"></div>
    <h1>Animation 2 </h1>
    <div style="height:500px;width:1000px;display:flex;justify-content:center">
    <div id="animation1"></div>
    </div>
</body>
</html>
