<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background: red;
            position: relative;
            animation-name: example;
            animation-duration: 3s;
            animation-fill-mode: forwards;
        }
    
        @keyframes example {
            from {
                top: 0px;
            }
    
            to {
                top: 200px;
                background-color: blue;
            }
        }
        div {
 width: 100px;
 height: 100px;
background: red;
 position: relative;
 animation-name: example;
 animation-duration: 3s;
 animation-delay: 2s;
 animation-fill-mode: both;
}
div {
 width: 100px;
 height: 100px;
 background: red;
 position: relative;
 animation-name: example;
 animation-duration: 3s;
 animation-delay: 2s;
animation-fill-mode: backwards;
}
    </style>
</head>
<body>
    <div></div>
</body>
</html>
