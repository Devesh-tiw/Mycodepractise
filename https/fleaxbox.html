<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        .container{
          
            width:100vw;
            height: 100vh;
            display:flex;

border:2px solid black;



        }
        .item1{
            width: 250px;
            height: 250px;
            background-color: rgb(255, 119, 0);
            


        }
          .item1:hover{
            width: 250px;
            height: 250px;
            background-color: rgb(255, 119, 0);
            transition-property: all;
            transition-duration:2s;
            transform:skew(45deg);


        }
          .item2{
            width: 250px;
            height: 250px;
            background-color: rgb(51, 0, 255);


        }
           .item2:hover{
            width: 250px;
            height: 250px;
            background-color: rgb(51, 0, 255);
 transition-property: all;
            transition-duration:2s;
            transform:skew(315deg);

        }
          .item3{
            width: 250px;
            height: 250px;
            background-color: rgb(98, 255, 0);


        }
          .item4{
            width: 250px;
            height: 250px;
            background-color: rgb(255, 0, 0);


        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1">1</div>
        <div class="item2">2</div>
        <div class="item3">4</div>
        <div class="item4">4</div>   
    </div>
  
</body>
</html>
