<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello</title>
</head>

<body>
    <button class="don">Click Me !</button>

    <script>
        let change = document.getElementsByClassName("don")[0];
        let currchange = "light";

        change.addEventListener("click", () => {

            if (currchange === "light") {
                document.body.style.backgroundColor = "black";
                change.style.backgroundColor = "blue";
                currchange = "black";
            } else {
                document.body.style.backgroundColor = "yellow";
                change.style.backgroundColor = "red";
                currchange = "light";
            }

        });
    </script>
</body>

</html>
