<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello</title>
</head>
<body>
    <button class="don">Click Me !</button>
</body>
<script>
    addEventListener("click", (don)=>{
         document.getElementsByClassName("don")[0].style.backgroundColor = "red";
        document.body.style.backgroundColor = "yellow";
    }, 5000);
    addEventListener("dblclick", (don)=>{
        document.getElementsByClassName("don")[0].style.backgroundColor = "blue";
        document.body.style.backgroundColor = "black";
    }, 5000);
  
</script>
</html>
